apiVersion: apps/v1
kind: Deployment
metadata:
  name: cim-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cim-worker
  template:
    metadata:
      labels:
        app: cim-worker
    spec:
      containers:
        - name: worker
          image: ayushk1503/cim-worker:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "backend.celery_app", "worker", "--loglevel=info"]
          env:
            - name: DATABASE_URL
              value: postgresql+asyncpg://postgres:password@postgres:5432/competitor_intel
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: OPENROUTER_API_KEY
              valueFrom:
                secretKeyRef:
                  name: cim-secrets
                  key: openrouter-api-key