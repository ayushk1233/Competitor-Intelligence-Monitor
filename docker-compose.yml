

services:

  # ── PostgreSQL Database ───────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: cim_postgres
    environment:
      POSTGRES_USER: cim_user
      POSTGRES_PASSWORD: cim_password
      POSTGRES_DB: competitor_intel
    volumes:
      # Data persists even if container is stopped or removed
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose to localhost so you can connect with a DB client
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cim_user -d competitor_intel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (Queue + Cache) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cim_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cim_backend
    ports:
      - "8000:8000"
    environment:
      # These are read from your .env file on your machine
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY}
      - SERPER_API_KEY=${SERPER_API_KEY}
      # Database connection string — uses service name 'postgres' as host
      - DATABASE_URL=postgresql+asyncpg://cim_user:cim_password@postgres:5432/competitor_intel
      # Redis connection — uses service name 'redis' as host
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Hot reload: local backend/ changes reflect instantly without rebuild
      - ./backend:/app/backend
    restart: unless-stopped

  # ── Celery Worker ─────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: cim_worker
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JINA_API_KEY=${JINA_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://cim_user:cim_password@postgres:5432/competitor_intel
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    restart: unless-stopped

# ── Named volumes (persist data between container restarts) ──────────────
volumes:
  postgres_data: